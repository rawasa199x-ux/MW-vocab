<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MW Vocab Builder</title>
    <style>
        :root {
            --bg-color: #f4f1ea;
            --card-bg: #ffffff;
            --text-main: #1c1c1c;
            --text-gray: #666666;
            --text-brown: #8b7d6b;
            --border: #d1cfc8;
            --red-maroon: #800000;
            --green-dark: #008000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        #app { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .view { display: none; flex: 1; flex-direction: column; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .view.active { display: flex; }

        .header-title { text-align: center; font-weight: bold; color: var(--text-brown); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        /* --- UNIT GRID (U1-U30) --- */
        .unit-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 25px; flex-shrink: 0; }
        .unit-btn { 
            background: var(--card-bg); border: 1px solid var(--border); padding: 10px 0; 
            font-size: 0.75em; font-weight: bold; cursor: pointer; text-align: center;
        }
        .unit-btn.active { background: var(--text-brown); color: white; border-color: var(--text-brown); }

        /* --- FLASHCARDS --- */
        .pinned-root { text-align: center; font-weight: bold; color: var(--text-brown); font-size: 1.2em; margin-bottom: 15px; text-transform: uppercase; }
        .card { 
            background: var(--card-bg); border: 1px solid var(--border); padding: 50px 20px;
            text-align: center; cursor: pointer; min-height: 250px; display: flex; flex-direction: column; justify-content: center;
        }
        .word-title { font-size: 2.4em; font-weight: bold; margin-bottom: 5px; }
        .phonetic { color: var(--text-gray); font-style: italic; margin-bottom: 20px; }
        .play-btn { background: transparent; border: 1px solid var(--border); padding: 8px 15px; font-size: 0.8em; color: var(--text-brown); display: inline-flex; align-items: center; gap: 8px; margin: 0 auto; border-radius: 2px; }
        .play-icon { width: 0; height: 0; border-top: 5px solid transparent; border-left: 8px solid var(--text-brown); border-bottom: 5px solid transparent; }

        /* BACK SIDE DETAILS */
        .card-back { display: none; text-align: left; margin-top: 25px; border-top: 1px solid var(--border); padding-top: 25px; }
        .meaning-th { font-size: 1.3em; font-weight: bold; color: var(--green-dark); text-align: center; margin-bottom: 20px; }
        .info-label { font-size: 0.7em; font-weight: bold; color: var(--text-brown); text-transform: uppercase; margin-bottom: 5px; }
        .info-txt { font-size: 0.9em; line-height: 1.5; margin-bottom: 15px; }
        .example-box { background: #f9f9f9; padding: 12px; border-left: 2px solid var(--border); font-style: italic; color: var(--text-gray); font-size: 0.9em; }

        .btn-group { display: none; gap: 10px; margin-top: 25px; }
        .btn-status { flex: 1; background: transparent; padding: 15px 0; font-weight: bold; cursor: pointer; font-size: 0.85em; text-transform: uppercase; }
        .btn-learning { border: 1px solid var(--red-maroon); color: var(--red-maroon); }
        .btn-knew { border: 1px solid var(--green-dark); color: var(--green-dark); }

        /* --- BROWSE (BLOCKS) --- */
        .browse-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .word-block { background: var(--card-bg); border: 1px solid var(--border); padding: 15px 10px; text-align: center; font-size: 0.85em; font-weight: 500; cursor: pointer; }

        /* --- QUIZ --- */
        .quiz-box { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 4px; }
        .quiz-opt { width: 100%; text-align: left; padding: 15px; border: 1px solid var(--border); background: transparent; margin-bottom: 10px; cursor: pointer; }
        .quiz-opt.correct { border-color: var(--green-dark); color: var(--green-dark); font-weight: bold; }
        .quiz-opt.wrong { border-color: var(--red-maroon); color: var(--red-maroon); }

        /* --- NAV --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--card-bg); border-top: 1px solid var(--border); display: flex; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-gray); font-size: 0.8em; font-weight: bold; text-transform: uppercase; }
        .nav-item.active { color: var(--text-brown); background: #fcfbf9; }
    </style>
</head>
<body>

<div id="app">
    <div id="view-cards" class="view active">
        <div class="header-title">Vocabulary Builder</div>
        <div class="unit-grid" id="card-unit-grid"></div>
        <div class="pinned-root" id="p-root">ROOT - MEANING</div>
        <div class="card" onclick="flipCard()">
            <div id="c-front">
                <div class="word-title" id="c-word">Word</div>
                <div class="phonetic" id="c-phonetic">/phonetic/</div>
                <div class="play-btn" onclick="event.stopPropagation(); playAudio();"><span class="play-icon"></span> ออกเสียง</div>
            </div>
            <div class="card-back" id="c-back">
                <div class="meaning-th" id="c-th">ความหมาย</div>
                <div class="info-label">Etymology & Context (EN/TH)</div>
                <div class="info-txt" id="c-ety">ที่มาข้อมูล</div>
                <div class="info-label">Example Sentence</div>
                <div class="example-box" id="c-ex">ประโยคตัวอย่าง</div>
            </div>
        </div>
        <div class="btn-group" id="c-btns">
            <button class="btn-status btn-learning" onclick="mark('learning')">still learning</button>
            <button class="btn-status btn-knew" onclick="mark('know')">knew it</button>
        </div>
    </div>

    <div id="view-browse" class="view">
        <div class="header-title">Browse Words</div>
        <div class="unit-grid" id="browse-unit-grid"></div>
        <div class="browse-grid" id="browse-content"></div>
    </div>

    <div id="view-quiz" class="view">
        <div class="header-title">Unit Quiz</div>
        <div class="unit-grid" id="quiz-unit-grid" style="margin-bottom: 30px;"></div>
        <div id="quiz-area">
            <div style="text-align: center; color: var(--text-gray);">Select a Unit above to start Quiz</div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('cards')">Cards</div>
        <div class="nav-item" onclick="switchTab('browse')">Browse</div>
        <div class="nav-item" onclick="switchTab('quiz')">Quiz</div>
    </nav>
</div>

<script>
    const vocabData = {
        "Unit 1": [
            { id: "u1_1", root: "BENE", rootTh: "ดี", word: "benediction", phonetic: "/ˌbɛnəˈdɪkʃัน/", meaning: "การสวดประสาทพร", ety: "EN: bene (good) + dicere (to speak). A blessing at the end of a religious service.\nTH: รากศัพท์แปลว่า 'พูดสิ่งดีๆ' ใช้เรียกบทสวดให้พรตอนจบพิธีในโบสถ์คริสต์", ex: "The bishop finished his benediction and the crowd began to leave." },
            { id: "u1_2", root: "BENE", rootTh: "ดี", word: "benefactor", phonetic: "/ˈbɛnəˌfæktər/", meaning: "ผู้มีพระคุณ", ety: "EN: bene (good) + facere (to do). One who does good deeds for others.\nTH: ผู้ที่ช่วยเหลือคนอื่น มักเน้นเรื่องการบริจาคเงินให้โรงพยาบาลหรือโรงเรียน", ex: "The school's new library was funded by an anonymous benefactor." },
            { id: "u1_3", root: "BENE", rootTh: "ดี", word: "beneficiary", phonetic: "/ˌbɛnəˈfɪʃiˌɛri/", meaning: "ผู้รับผลประโยชน์", ety: "EN: One who receives benefits from a will, insurance, or trust.\nTH: คนที่ได้รับเงินหรือทรัพย์สินตามพินัยกรรมหรือจากกรมธรรม์ประกันชีวิต", ex: "She was the sole beneficiary of her father's will." },
            { id: "u1_4", root: "BENE", rootTh: "ดี", word: "benevolence", phonetic: "/bəˈnɛvələns/", meaning: "ความเมตตา", ety: "EN: bene (good) + velle (to wish). Good will and kindness.\nTH: ความปรารถนาดี นิสัยใจคอที่ชอบช่วยเหลือและเอื้อเฟื้อเผื่อแผ่ต่อเพื่อนมนุษย์", ex: "The charity relies on the benevolence of the public." },
            { id: "u1_5", root: "AM", rootTh: "ความรัก", word: "amicable", phonetic: "/ˈæmɪkəbəl/", meaning: "เป็นมิตร", ety: "EN: Friendly and without disagreement. Related to amicus (friend).\nTH: ความสัมพันธ์ที่ปรองดอง ไม่มีความขัดแย้ง มักใช้กับการเจรจาหรือการหย่าร้างที่จบลงด้วยดี", ex: "They reached an amicable agreement without going to court." },
            { id: "u1_6", root: "AM", rootTh: "ความรัก", word: "enamored", phonetic: "/ɪˈnæmərd/", meaning: "หลงรัก", ety: "EN: Filled with love or fascination. From amor (love).\nTH: การตกหลุมรักหรือหลงใหลในบางสิ่งมากๆ เช่น หลงรักวัฒนธรรมต่างชาติ", ex: "He was enamored of the local food and music." },
            { id: "u1_7", root: "AM", rootTh: "ความรัก", word: "amorous", phonetic: "/ˈæmərəs/", meaning: "แสดงความรัก", ety: "EN: Expressing strong feelings of love, especially sexual attraction.\nTH: การแสดงออกทางความรัก มักใช้สื่อถึงความรักเชิงชู้สาว", ex: "The amorous couple spent the whole evening together." },
            { id: "u1_8", root: "AM", rootTh: "ความรัก", word: "paramour", phonetic: "/ˈpærəˌmʊr/", meaning: "ชู้รัก", ety: "EN: A secret lover, especially one in an illicit relationship.\nTH: คนรักที่ลักลอบคบกัน มักหมายถึงคนรักที่เป็นความลับหรือผิดศีลธรรม", ex: "The king's paramour exerted great influence over his decisions." }
        ]
    };

    // จำลอง 30 Units
    for(let i=2; i<=30; i++) { vocabData[`Unit ${i}`] = []; }

    let curUnit = "Unit 1";
    let curIdx = 0;
    let progress = JSON.parse(localStorage.getItem('mw_v4')) || {};

    function switchTab(tab) {
        document.querySelectorAll('.view, .nav-item').forEach(e => e.classList.remove('active'));
        document.getElementById('view-'+tab).classList.add('active');
        const idx = ["cards", "browse", "quiz"].indexOf(tab);
        document.querySelectorAll('.nav-item')[idx].classList.add('active');
        renderUnitGrid();
        if(tab === 'browse') renderBrowse();
    }

    function renderUnitGrid() {
        ["card", "browse", "quiz"].forEach(view => {
            const grid = document.getElementById(`${view}-unit-grid`);
            grid.innerHTML = '';
            for(let i=1; i<=30; i++) {
                const btn = document.createElement('div');
                btn.className = 'unit-btn' + (curUnit === `Unit ${i}` ? ' active' : '');
                btn.innerText = `U${i}`;
                btn.onclick = () => { curUnit = `Unit ${i}`; curIdx = 0; renderUnitGrid(); if(view==='card') renderCard(); if(view==='browse') renderBrowse(); if(view==='quiz') startQuiz(); };
                grid.appendChild(btn);
            }
        });
    }

    function renderCard() {
        const words = vocabData[curUnit];
        if(!words.length) { document.getElementById('p-root').innerText = "NO DATA"; document.querySelector('.card').style.display = 'none'; return; }
        const d = words[curIdx];
        document.querySelector('.card').style.display = 'flex';
        document.getElementById('p-root').innerText = `${d.root} - ${d.rootTh}`;
        document.getElementById('c-word').innerText = d.word;
        document.getElementById('c-phonetic').innerText = d.phonetic;
        document.getElementById('c-th').innerText = d.meaning;
        document.getElementById('c-ety').innerText = d.ety;
        document.getElementById('c-ex').innerText = d.ex;
        document.getElementById('c-back').style.display = 'none';
        document.getElementById('c-btns').style.display = 'none';
        document.getElementById('c-front').style.display = 'block';
    }

    function flipCard() {
        document.getElementById('c-front').style.display = 'none';
        document.getElementById('c-back').style.display = 'block';
        document.getElementById('c-btns').style.display = 'flex';
        playAudio();
    }

    function playAudio() {
        const s = new SpeechSynthesisUtterance(vocabData[curUnit][curIdx].word);
        s.lang = 'en-US'; speechSynthesis.speak(s);
    }

    function mark(st) {
        progress[vocabData[curUnit][curIdx].id] = st;
        localStorage.setItem('mw_v4', JSON.stringify(progress));
        curIdx = (curIdx + 1) % vocabData[curUnit].length;
        renderCard();
    }

    function renderBrowse() {
        const c = document.getElementById('browse-content');
        c.innerHTML = '';
        vocabData[curUnit].forEach(w => {
            const b = document.createElement('div');
            b.className = 'word-block';
            b.innerText = w.word;
            b.onclick = () => { curIdx = vocabData[curUnit].indexOf(w); switchTab('cards'); renderCard(); flipCard(); };
            c.appendChild(b);
        });
    }

    function startQuiz() {
        const ws = vocabData[curUnit];
        if(ws.length < 4) { document.getElementById('quiz-area').innerHTML = 'Need 4+ words in this unit to start quiz.'; return; }
        const pool = [...ws].sort(() => 0.5 - Math.random()).slice(0, 10);
        let qIdx = 0;
        function renderQ() {
            const q = pool[qIdx];
            const opts = [q, ...ws.filter(w => w.id !== q.id).sort(() => 0.5 - Math.random()).slice(0, 3)].sort(() => 0.5 - Math.random());
            document.getElementById('quiz-area').innerHTML = `
                <div class="quiz-box">
                    <div style="font-size: 0.8em; color: gray; margin-bottom: 10px;">Q ${qIdx+1}/10</div>
                    <div class="quiz-question">${q.meaning} (Definition: ${q.ety.split('\n')[0].replace('EN: ', '')})</div>
                    <div style="margin-top:20px;">
                        ${opts.map(o => `<button class="quiz-opt" onclick="check(this, '${o.id}', '${q.id}')">${o.word}</button>`).join('')}
                    </div>
                </div>
            `;
        }
        window.check = (b, sid, cid) => {
            document.querySelectorAll('.quiz-opt').forEach(e => e.disabled = true);
            if(sid === cid) b.classList.add('correct');
            else { b.classList.add('wrong'); document.querySelectorAll('.quiz-opt').forEach(e => { if(e.innerText === ws.find(w=>w.id===cid).word) e.classList.add('correct'); }); }
            setTimeout(() => { qIdx++; if(qIdx < pool.length) renderQ(); else document.getElementById('quiz-area').innerHTML = '<div class="quiz-box" style="text-align:center;">Quiz Finished!</div>'; }, 1500);
        };
        renderQ();
    }

    renderUnitGrid(); renderCard();
</script>
</body>
</html>
